<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tony ❤️ Ella</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:  #ff4d8d;
      --rose:  #ff1a6b;
      --blush: #ffb3cc;
      --deep:  #8b0042;
      --dark:  #0a0006;
      --glass: rgba(255,255,255,0.05);
      --border: rgba(255,77,141,0.22);
      --glow:  0 0 50px rgba(255,77,141,0.55);
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--dark);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── CUSTOM CURSOR (desktop only) ── */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--pink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 16px var(--pink), 0 0 32px var(--pink);
      transition: transform 0.08s, width 0.2s, height 0.2s, opacity 0.2s;
      will-change: left, top;
    }
    .cursor.clicking {
      width: 18px; height: 18px;
      opacity: 0.7;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1.5px solid rgba(255,77,141,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: all 0.18s cubic-bezier(0.16,1,0.3,1);
      will-change: left, top;
    }
    @media (hover: none) {
      .cursor, .cursor-ring { display: none; }
      body { cursor: default; }
    }

    /* ── BACKGROUND ── */
    .ella-bg {
      position: fixed; inset: 0;
      background-image: url('/static/ella.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.13) saturate(1.8) hue-rotate(300deg);
      transform: scale(1.06);
      animation: breathe 9s ease-in-out infinite;
      z-index: 0;
      will-change: transform, filter;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1.06); filter: brightness(0.13) saturate(1.8) hue-rotate(300deg); }
      50%      { transform: scale(1.10); filter: brightness(0.18) saturate(2.2) hue-rotate(318deg); }
    }

    /* ── NOISE TEXTURE ── */
    .noise {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; z-index: 2;
      background:
        radial-gradient(ellipse 90% 70% at 50% 0%,   rgba(255,77,141,0.22) 0%, transparent 68%),
        radial-gradient(ellipse 55% 45% at 85% 100%,  rgba(139,0,66,0.45)  0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 5%  55%,   rgba(255,26,107,0.12) 0%, transparent 60%),
        linear-gradient(180deg, rgba(10,0,6,0.25) 0%, rgba(10,0,6,0.75) 100%);
    }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    /* ── SCANLINE ── */
    .scanline {
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--pink) 40%, rgba(255,179,204,0.8) 50%, var(--pink) 60%, transparent 100%);
      animation: scan 5s linear infinite;
      z-index: 4; opacity: 0.28;
      filter: blur(0.5px);
    }
    @keyframes scan { 0% { top: -2px; } 100% { top: 100%; } }

    /* ── CORNER BRACKETS ── */
    .corner {
      position: fixed; width: 64px; height: 64px;
      z-index: 4; opacity: 0.45;
      animation: cornerPulse 4s ease-in-out infinite;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute; background: var(--pink);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 16px; left: 16px; }
    .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }
    @keyframes cornerPulse {
      0%,100% { opacity: 0.45; }
      50%      { opacity: 0.75; }
    }
    @media (max-width: 480px) {
      .corner { width: 40px; height: 40px; }
      .corner.tl { top: 12px; left: 12px; }
      .corner.tr { top: 12px; right: 12px; }
      .corner.bl { bottom: 12px; left: 12px; }
      .corner.br { bottom: 12px; right: 12px; }
    }

    /* ── SILHOUETTE ── */
    .ella-silhouette {
      position: fixed; right: -80px; top: 50%;
      transform: translateY(-50%);
      width: 360px; height: 480px;
      background-image: url('/static/ella.jpg');
      background-size: cover; background-position: center top;
      border-radius: 200px 200px 0 0;
      opacity: 0.15;
      filter: blur(3px) saturate(2.5);
      mask-image: radial-gradient(ellipse at 35% 50%, black 25%, transparent 72%);
      -webkit-mask-image: radial-gradient(ellipse at 35% 50%, black 25%, transparent 72%);
      z-index: 2;
      animation: silFloat 7s ease-in-out infinite;
    }
    @keyframes silFloat {
      0%,100% { transform: translateY(-50%) translateX(0);  opacity: 0.15; }
      50%      { transform: translateY(-52%) translateX(-10px); opacity: 0.22; }
    }
    @media (max-width: 700px) { .ella-silhouette { display: none; } }

    /* ── CANVAS ── */
    canvas {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
    }

    /* ── ERROR FLASH ── */
    .error-flash {
      position: fixed; inset: 0; z-index: 6; pointer-events: none;
      background: rgba(255,0,60,0.1);
      opacity: 0; transition: opacity 0.08s;
    }
    .error-flash.show { opacity: 1; }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 10;
      width: min(420px, calc(100vw - 32px));
      padding: clamp(32px, 6vw, 52px) clamp(24px, 6vw, 44px) clamp(28px, 5vw, 44px);
      background: rgba(10,0,6,0.6);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(255,77,141,0.06),
        0 50px 100px rgba(0,0,0,0.55),
        0 0 60px rgba(255,77,141,0.1),
        inset 0 1px 0 rgba(255,255,255,0.07);
      animation: cardReveal 1.1s cubic-bezier(0.16,1,0.3,1) both;
      overflow: hidden;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(70px) scale(0.93); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0)  scale(1);    filter: blur(0); }
    }

    /* shimmer top border */
    .card::before {
      content: '';
      position: absolute; top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 55%; height: 1px;
      background: linear-gradient(90deg, transparent, #ff85b3, white, #ff85b3, transparent);
      animation: shimmerLine 3.5s ease-in-out infinite;
    }
    @keyframes shimmerLine {
      0%,100% { opacity: 0.4; width: 45%; }
      50%      { opacity: 1;   width: 75%; }
    }

    /* inner glow on hover */
    .card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 28px;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,77,141,0.08) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .card:hover::after { opacity: 1; }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: clamp(24px, 5vw, 36px); }

    .heart-icon {
      display: inline-block;
      font-size: clamp(28px, 8vw, 36px);
      animation: hb 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 14px var(--pink)) drop-shadow(0 0 28px rgba(255,77,141,0.5));
      margin-bottom: 10px;
    }
    @keyframes hb {
      0%,100% { transform: scale(1); }
      14%     { transform: scale(1.28); }
      28%     { transform: scale(1); }
      42%     { transform: scale(1.20); }
      70%     { transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.65rem, 5.5vw, 2rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      animation: fadeUp 1.2s 0.28s cubic-bezier(0.16,1,0.3,1) both;
    }
    .subtitle {
      margin-top: 6px;
      font-size: clamp(0.82rem, 2.5vw, 0.95rem);
      color: rgba(255,179,204,0.7);
      font-style: italic;
      letter-spacing: 0.06em;
      animation: fadeUp 1.2s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── INPUTS ── */
    .input-group {
      position: relative;
      margin-bottom: 16px;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .input-group:nth-of-type(1) { animation-delay: 0.55s; }
    .input-group:nth-of-type(2) { animation-delay: 0.68s; }

    .input-label {
      display: block;
      font-size: 0.7rem;
      color: rgba(255,179,204,0.6);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; opacity: 0.5;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,77,141,0.2);
      border-radius: 14px;
      color: white;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 3vw, 1rem);
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      -webkit-appearance: none;
      /* prevent iOS zoom */
      font-size: max(16px, 1rem);
    }
    input::placeholder { color: rgba(255,179,204,0.28); }
    input:focus {
      border-color: var(--pink);
      background: rgba(255,77,141,0.07);
      box-shadow: 0 0 0 3px rgba(255,77,141,0.14), 0 0 22px rgba(255,77,141,0.15);
    }
    input:focus ~ .input-icon,
    .input-wrap:focus-within .input-icon { opacity: 0.9; }

    /* floating label effect on focus */
    .input-group:focus-within .input-label {
      color: rgba(255,179,204,0.95);
      transition: color 0.2s;
    }

    /* ── STRENGTH BAR (password) ── */
    .strength-bar {
      height: 2px;
      margin-top: 5px;
      border-radius: 2px;
      background: rgba(255,77,141,0.12);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--rose), var(--pink), #ff85b3);
      transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 0 8px rgba(255,77,141,0.6);
    }

    /* ── BUTTON ENTER ── */
    .btn-enter {
      width: 100%;
      padding: clamp(13px, 3.5vw, 16px);
      margin-top: 10px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #ff5c96 0%, var(--rose) 100%);
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.92rem, 3vw, 1rem);
      letter-spacing: 0.09em;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.22s cubic-bezier(0.16,1,0.3,1), box-shadow 0.22s;
      box-shadow: 0 8px 32px rgba(255,77,141,0.42), 0 2px 8px rgba(0,0,0,0.3);
      animation: fadeUp 1.2s 0.82s cubic-bezier(0.16,1,0.3,1) both;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-enter::before {
      content: '';
      position: absolute; top: 0; left: -120%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transition: left 0.55s ease;
    }
    .btn-enter:hover::before { left: 120%; }
    .btn-enter:hover  { transform: translateY(-3px); box-shadow: 0 16px 44px rgba(255,77,141,0.62), 0 4px 12px rgba(0,0,0,0.3); }
    .btn-enter:active { transform: scale(0.97); box-shadow: 0 4px 16px rgba(255,77,141,0.4); }

    /* ripple */
    .btn-enter .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* loading spinner inside button */
    .btn-enter.loading { pointer-events: none; }
    .btn-enter.loading .btn-text { opacity: 0; }
    .btn-enter.loading::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 20px; height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ── */
    .error-msg {
      text-align: center;
      color: #ff7aaa;
      font-size: clamp(0.78rem, 2.5vw, 0.85rem);
      margin-top: 9px;
      min-height: 18px;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .error-msg.visible {
      opacity: 1; transform: translateY(0);
    }

    /* ── LOVE SECTION ── */
    .love-section {
      margin-top: clamp(18px, 4vw, 26px);
      text-align: center;
      animation: fadeUp 1.2s 1.0s cubic-bezier(0.16,1,0.3,1) both;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,77,141,0.25), transparent);
    }
    .divider-dot {
      font-size: 10px; color: rgba(255,77,141,0.5);
      letter-spacing: 4px;
    }

    .btn-love {
      background: transparent;
      border: 1px solid rgba(255,77,141,0.35);
      padding: clamp(9px, 2.5vw, 11px) clamp(22px, 5vw, 30px);
      border-radius: 50px;
      color: var(--blush);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.88rem, 2.8vw, 0.96rem);
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-love::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,77,141,0.15) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.35s;
      border-radius: 50px;
    }
    .btn-love:hover::before, .btn-love:focus::before { opacity: 1; }
    .btn-love:hover {
      border-color: var(--pink);
      box-shadow: 0 0 22px rgba(255,77,141,0.35), inset 0 0 12px rgba(255,77,141,0.08);
      color: white; transform: scale(1.03);
    }
    .btn-love:active { transform: scale(0.97); }
    .btn-love.activated {
      border-color: var(--rose);
      background: rgba(255,26,107,0.18);
      box-shadow: 0 0 40px rgba(255,26,107,0.55);
      color: white;
      animation: lovePop 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes lovePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      70%  { transform: scale(0.96); }
      100% { transform: scale(1); }
    }

    .footer-text {
      margin-top: 13px;
      font-size: clamp(0.7rem, 2vw, 0.78rem);
      color: rgba(255,179,204,0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── SHAKE ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      12% { transform: translateX(-9px) rotate(-0.5deg); }
      25% { transform: translateX(9px)  rotate(0.5deg);  }
      37% { transform: translateX(-7px); }
      50% { transform: translateX(7px);  }
      62% { transform: translateX(-4px); }
      75% { transform: translateX(4px);  }
      87% { transform: translateX(-2px); }
    }
    .shake { animation: shake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) !important; }

    /* ── SUCCESS OVERLAY ── */
    .success-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: radial-gradient(ellipse at 50% 40%, rgba(255,77,141,0.97) 0%, rgba(100,0,42,0.99) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter: blur(10px);
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }

    .success-big-heart {
      font-size: clamp(60px, 18vw, 90px);
      animation: hb 1s ease-in-out infinite, successPop 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) both;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.4));
    }
    .success-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 7vw, 3rem);
      color: white;
      text-shadow: 0 0 40px rgba(255,255,255,0.3);
      animation: successPop 0.7s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .success-overlay p {
      color: rgba(255,255,255,0.8);
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      font-style: italic;
      animation: successPop 0.7s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes successPop {
      from { opacity: 0; transform: scale(0.4) translateY(20px); filter: blur(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0);     filter: blur(0); }
    }

    /* ── PETALS ── */
    .petal {
      position: fixed;
      background: radial-gradient(ellipse, #ff5c96, #c0002a);
      border-radius: 50% 0 50% 0;
      pointer-events: none; z-index: 5; opacity: 0;
      animation: petalFall linear infinite;
      filter: blur(0.3px);
    }
    @keyframes petalFall {
      0%   { opacity: 0;   transform: translateY(-30px) rotate(0deg) scale(0); }
      8%   { opacity: 0.75; transform: translateY(0)   rotate(25deg) scale(1); }
      90%  { opacity: 0.5; }
      100% { opacity: 0;   transform: translateY(108vh) rotate(380deg) scale(0.4); }
    }

    /* ── FLOATING HEARTS (ambient) ── */
    .float-heart {
      position: fixed;
      font-size: 14px;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 6px var(--pink));
    }
    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0) scale(0.6) rotate(-10deg); }
      15%  { opacity: 0.6; }
      85%  { opacity: 0.3; }
      100% { opacity: 0;   transform: translateY(-100px) scale(1) rotate(10deg); }
    }
  </style>
</head>
<body>
  <!-- cursor -->
  <div class="cursor"  id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- bg layers -->
  <div class="ella-bg"></div>
  <div class="noise"></div>
  <div class="overlay"></div>
  <div class="vignette"></div>
  <div class="ella-silhouette"></div>
  <div class="scanline"></div>

  <!-- corner brackets -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <canvas id="canvas"></canvas>
  <div class="error-flash" id="errorFlash"></div>

  <!-- SUCCESS -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-big-heart">❤️</div>
    <h2>Welcome, My Love</h2>
    <p>Entering our world…</p>
  </div>

  <!-- CARD -->
  <div class="card" id="card">
    <div class="header">
      <div class="heart-icon">💕</div>
      <h1>Welcome, Ella</h1>
      <p class="subtitle">from Tonie, with all my heart</p>
    </div>

    <div class="input-group">
      <label class="input-label">Your Name</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="name" placeholder="Type your name…" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Secret Code</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="Our little secret…" autocomplete="current-password">
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <button class="btn-enter" id="btnEnter" onclick="login(event)">
      <span class="btn-text">Enter Our World ✦</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="love-section">
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot">✦ ✦ ✦</div>
        <div class="divider-line"></div>
      </div>
      <button class="btn-love" id="loveBtn" onclick="loveMe(event)">Love Me? 💗</button>
      <p class="footer-text">Only for Ella · Forever</p>
    </div>
  </div>

  <script>
  /* ══════════════════════════════════════════
     CURSOR
  ══════════════════════════════════════════ */
  const cursorEl  = document.getElementById('cursor');
  const cursorRing = document.getElementById('cursorRing');
  let mx=0, my=0, rx=0, ry=0;
  let rafId;

  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
  document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));

  (function moveCursor(){
    cursorEl.style.left = mx+'px';
    cursorEl.style.top  = my+'px';
    rx += (mx-rx)*0.14;
    ry += (my-ry)*0.14;
    cursorRing.style.left = rx+'px';
    cursorRing.style.top  = ry+'px';
    requestAnimationFrame(moveCursor);
  })();

  /* ══════════════════════════════════════════
     CANVAS PARTICLES
  ══════════════════════════════════════════ */
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  function resizeCanvas(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const COLORS = ['#ff4d8d','#ff1a6b','#ffb3cc','#ff85b3','#ff6699','#ffd6e7'];

  class Particle {
    constructor(x, y, burst=false){
      this.x = x ?? Math.random()*canvas.width;
      this.y = y ?? Math.random()*canvas.height;
      this.size = burst ? Math.random()*4+2 : Math.random()*2.2+0.4;
      const spd = burst ? Math.random()*5+1.5 : Math.random()*0.55+0.1;
      const ang = burst ? Math.random()*Math.PI*2 : -Math.PI/2+(Math.random()-0.5)*0.9;
      this.vx = Math.cos(ang)*spd;
      this.vy = Math.sin(ang)*spd;
      this.color = COLORS[Math.random()*COLORS.length|0];
      this.alpha = burst ? 1 : Math.random()*0.55+0.2;
      this.decay = burst ? 0.022 : 0.0025;
      this.life  = 1;
      this.isHeart = Math.random() > 0.55;
      this.spin  = (Math.random()-0.5)*0.06;
      this.rotation = Math.random()*Math.PI*2;
    }
    update(){
      this.x += this.vx;
      this.y += this.vy;
      this.vy -= 0.004;
      this.rotation += this.spin;
      this.life -= this.decay;
    }
    draw(){
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life) * this.alpha;
      ctx.fillStyle = this.color;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      if(this.isHeart){
        ctx.font = `${this.size*6}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♥', 0, 0);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  const particles = [];
  setInterval(()=>{ if(particles.length < 90) particles.push(new Particle()); }, 110);

  (function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1; i>=0; i--){
      particles[i].update();
      particles[i].draw();
      if(particles[i].life <= 0) particles.splice(i,1);
    }
    requestAnimationFrame(loop);
  })();

  // click burst (desktop + touch)
  function burst(x, y, n=20){
    for(let i=0; i<n; i++) particles.push(new Particle(x, y, true));
  }
  document.addEventListener('click', e => burst(e.clientX, e.clientY, 18));
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    burst(t.clientX, t.clientY, 14);
  }, {passive:true});

  /* ══════════════════════════════════════════
     PETALS
  ══════════════════════════════════════════ */
  for(let i=0; i<18; i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = Math.random()*9+5;
    p.style.cssText = `
      left:${Math.random()*100}vw;
      width:${size}px;
      height:${size*1.3}px;
      animation-duration:${Math.random()*12+9}s;
      animation-delay:${Math.random()*12}s;
      opacity:0;
    `;
    document.body.appendChild(p);
  }

  /* ══════════════════════════════════════════
     FLOATING AMBIENT HEARTS
  ══════════════════════════════════════════ */
  const heartEmoji = ['💕','💗','💖','💓','♥','✦'];
  for(let i=0; i<8; i++){
    const h = document.createElement('div');
    h.className='float-heart';
    h.textContent = heartEmoji[i % heartEmoji.length];
    h.style.cssText = `
      left:${Math.random()*100}vw;
      bottom:${Math.random()*30}vh;
      font-size:${Math.random()*10+10}px;
      animation-duration:${Math.random()*6+5}s;
      animation-delay:${Math.random()*8}s;
    `;
    document.body.appendChild(h);
  }

  /* ══════════════════════════════════════════
     PASSWORD STRENGTH FILL
  ══════════════════════════════════════════ */
  document.getElementById('password').addEventListener('input', function(){
    const len = this.value.length;
    const pct = Math.min(100, len * 11);
    document.getElementById('strengthFill').style.width = pct + '%';
  });

  /* ══════════════════════════════════════════
     RIPPLE HELPER
  ══════════════════════════════════════════ */
  function addRipple(btn, e){
    const rect = btn.getBoundingClientRect();
    const x = (e.clientX || rect.left+rect.width/2) - rect.left;
    const y = (e.clientY || rect.top+rect.height/2) - rect.top;
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
    btn.appendChild(r);
    setTimeout(()=>r.remove(), 600);
  }

  /* ══════════════════════════════════════════
     ERROR HELPER
  ══════════════════════════════════════════ */
  function showError(msg){
    const card  = document.getElementById('card');
    const flash = document.getElementById('errorFlash');
    const err   = document.getElementById('errorMsg');

    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');

    flash.classList.add('show');
    err.textContent = msg;
    err.classList.add('visible');

    setTimeout(()=>{
      flash.classList.remove('show');
      card.classList.remove('shake');
    }, 600);
  }

  /* ══════════════════════════════════════════
     LOGIN
  ══════════════════════════════════════════ */
  async function login(e){
    const btn = document.getElementById('btnEnter');
    addRipple(btn, e);

    const name     = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('visible');
    errorMsg.textContent = '';

    btn.classList.add('loading');

    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, password})
      });
      const data = await res.json();
      btn.classList.remove('loading');

      if(data.success){
        document.getElementById('successOverlay').classList.add('show');
        // big confetti burst
        for(let i=0; i<80; i++)
          setTimeout(()=>{ particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height, true)); }, i*35);
        setTimeout(()=>window.location.href='/dashboard', 2800);
      } else {
        showError(data.message || 'Only Ella can enter 💔');
      }
    } catch(err){
      btn.classList.remove('loading');
      showError('Connection error 💔');
    }
  }

  /* ══════════════════════════════════════════
     LOVE ME
  ══════════════════════════════════════════ */
  function loveMe(e){
    const btn = document.getElementById('loveBtn');
    addRipple(btn, e);
    btn.innerHTML = 'I Love You more 💖';
    btn.classList.add('activated');
    const r = btn.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, 36);
  }

  /* ══════════════════════════════════════════
     KEYBOARD
  ══════════════════════════════════════════ */
  document.addEventListener('keydown', e => {
    if(e.key === 'Enter') login(e);
  });
  </script>
</body>
</html>
