<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tony ❤️ Ella</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #ff4d8d;
      --rose: #ff1a6b;
      --blush: #ffb3cc;
      --deep: #8b0042;
      --glass: rgba(255,255,255,0.08);
      --glow: 0 0 40px rgba(255, 77, 141, 0.6);
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #0a0006;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: none;
    }

    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--pink);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s;
      box-shadow: 0 0 20px var(--pink), 0 0 40px var(--pink);
    }
    .cursor-trail {
      position: fixed;
      width: 30px; height: 30px;
      border: 1px solid rgba(255,77,141,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all 0.15s ease;
    }

    .ella-bg {
      position: fixed;
      inset: 0;
      background-image: url('/static/ella.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.15) saturate(1.5) hue-rotate(300deg);
      transform: scale(1.05);
      animation: breathe 8s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1.05); filter: brightness(0.15) saturate(1.5) hue-rotate(300deg); }
      50% { transform: scale(1.08); filter: brightness(0.2) saturate(2) hue-rotate(320deg); }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 50% 0%, rgba(255,77,141,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,0,66,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 50%, rgba(255,26,107,0.15) 0%, transparent 60%),
        linear-gradient(180deg, rgba(10,0,6,0.3) 0%, rgba(10,0,6,0.7) 100%);
      z-index: 1;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      animation: scan 4s linear infinite;
      z-index: 3;
      opacity: 0.4;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    .corner {
      position: fixed;
      width: 80px; height: 80px;
      z-index: 4;
      opacity: 0.5;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--pink);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 20px; left: 20px; }
    .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

    .ella-silhouette {
      position: fixed;
      right: -60px; top: 50%;
      transform: translateY(-50%);
      width: 380px; height: 500px;
      background-image: url('/static/ella.jpg');
      background-size: cover;
      background-position: center top;
      border-radius: 200px 200px 0 0;
      opacity: 0.18;
      filter: blur(2px) saturate(2);
      mask-image: radial-gradient(ellipse at 40% 50%, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 40% 50%, black 30%, transparent 75%);
      z-index: 2;
      animation: silhouetteFloat 6s ease-in-out infinite;
    }
    @keyframes silhouetteFloat {
      0%, 100% { transform: translateY(-50%) translateX(0); opacity: 0.18; }
      50% { transform: translateY(-52%) translateX(-8px); opacity: 0.24; }
    }

    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      padding: 52px 44px 44px;
      background: rgba(10, 0, 6, 0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,77,141,0.2);
      border-radius: 24px;
      box-shadow: 0 0 0 1px rgba(255,77,141,0.08), 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      overflow: hidden;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(60px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
      animation: topGlow 3s ease-in-out infinite;
    }
    @keyframes topGlow {
      0%, 100% { opacity: 0.4; width: 60%; }
      50% { opacity: 1; width: 80%; }
    }

    .header { text-align: center; margin-bottom: 36px; }

    .heart-icon {
      display: inline-block;
      font-size: 32px;
      animation: heartbeat 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 12px var(--pink));
      margin-bottom: 12px;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.25); }
      28% { transform: scale(1); }
      42% { transform: scale(1.18); }
      70% { transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      animation: titleReveal 1.4s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .subtitle {
      margin-top: 6px;
      font-size: 0.95rem;
      color: rgba(255,179,204,0.7);
      font-style: italic;
      letter-spacing: 0.05em;
      animation: titleReveal 1.4s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .input-group {
      position: relative;
      margin-bottom: 18px;
      animation: titleReveal 1.4s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .input-group:nth-child(2) { animation-delay: 0.75s; }
    .input-label {
      display: block;
      font-size: 0.75rem;
      color: rgba(255,179,204,0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,77,141,0.2);
      border-radius: 12px;
      color: white;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }
    input::placeholder { color: rgba(255,179,204,0.3); }
    input:focus {
      border-color: var(--pink);
      background: rgba(255,77,141,0.06);
      box-shadow: 0 0 0 3px rgba(255,77,141,0.12), 0 0 20px rgba(255,77,141,0.15);
    }

    .btn-enter {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--rose) 100%);
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(255,77,141,0.4);
      animation: titleReveal 1.4s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .btn-enter::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    .btn-enter:hover::before { left: 100%; }
    .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,77,141,0.6); }
    .btn-enter:active { transform: scale(0.98); }

    .love-section {
      margin-top: 24px;
      text-align: center;
      animation: titleReveal 1.4s 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .btn-love {
      background: transparent;
      border: 1px solid rgba(255,77,141,0.4);
      padding: 10px 28px;
      border-radius: 50px;
      color: var(--blush);
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      cursor: none;
      transition: all 0.3s ease;
    }
    .btn-love:hover {
      border-color: var(--pink);
      background: rgba(255,77,141,0.1);
      box-shadow: 0 0 20px rgba(255,77,141,0.3);
      color: white;
    }
    .btn-love.activated {
      border-color: var(--rose);
      background: rgba(255,26,107,0.2);
      box-shadow: 0 0 40px rgba(255,26,107,0.5);
      animation: loveActivated 0.5s ease;
    }
    @keyframes loveActivated {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .footer-text {
      margin-top: 14px;
      font-size: 0.78rem;
      color: rgba(255,179,204,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.5s ease !important; }

    .error-flash {
      position: fixed; inset: 0;
      background: rgba(255,0,0,0.08);
      z-index: 100; pointer-events: none;
      opacity: 0; transition: opacity 0.1s;
    }
    .error-flash.show { opacity: 1; }

    .error-msg {
      text-align: center;
      color: #ff6b9d;
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 20px;
      letter-spacing: 0.05em;
      animation: titleReveal 0.3s ease;
    }

    .success-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,77,141,0.95) 0%, rgba(139,0,66,0.98) 100%);
      z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }
    .success-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem; color: white;
      animation: successPop 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes successPop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .success-overlay p {
      color: rgba(255,255,255,0.8);
      font-size: 1.2rem; margin-top: 12px;
      animation: successPop 0.6s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .petal {
      position: fixed;
      background: radial-gradient(ellipse, #ff4d8d, #c0002a);
      border-radius: 50% 0 50% 0;
      pointer-events: none;
      z-index: 5; opacity: 0;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0); }
      10%  { opacity: 0.8; transform: translateY(0) rotate(30deg) scale(1); }
      90%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(110vh) rotate(360deg) scale(0.5); }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>
  <div class="ella-bg"></div>
  <div class="overlay"></div>
  <div class="ella-silhouette"></div>
  <div class="scanline"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <canvas id="canvas"></canvas>
  <div class="error-flash" id="errorFlash"></div>

  <div class="success-overlay" id="successOverlay">
    <div style="font-size:80px;animation:heartbeat 1s infinite">❤️</div>
    <h2>Welcome, My Love</h2>
    <p>Entering our world…</p>
  </div>

  <div class="card" id="card">
    <div class="header">
      <div class="heart-icon">💕</div>
      <h1>Welcome, Ella</h1>
      <p class="subtitle">from Tonie, with all my heart</p>
    </div>

    <div class="input-group">
      <label class="input-label">Your Name</label>
      <input type="text" id="name" placeholder="Type your name…" autocomplete="off">
    </div>

    <div class="input-group">
      <label class="input-label">Secret Code</label>
      <input type="password" id="password" placeholder="Our little secret…">
    </div>

    <button class="btn-enter" onclick="login()">Enter Our World ✦</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="love-section">
      <button class="btn-love" id="loveBtn" onclick="loveMe()">Love Me? 💗</button>
      <p class="footer-text">Only for Ella · Forever</p>
    </div>
  </div>

  <script>
    /* ── CURSOR ── */
    const cursor = document.getElementById('cursor');
    const trail  = document.getElementById('cursorTrail');
    let mx=0,my=0,tx=0,ty=0;
    document.addEventListener('mousemove', e => {
      mx=e.clientX; my=e.clientY;
      cursor.style.left=mx+'px'; cursor.style.top=my+'px';
    });
    setInterval(()=>{
      tx+=(mx-tx)*0.15; ty+=(my-ty)*0.15;
      trail.style.left=tx+'px'; trail.style.top=ty+'px';
    },16);

    /* ── CANVAS PARTICLES ── */
    const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
    const COLORS=['#ff4d8d','#ff1a6b','#ffb3cc','#ff85b3','#ff6699'];
    const particles=[];
    class Particle {
      constructor(x,y,burst=false){
        this.x=x??Math.random()*canvas.width;
        this.y=y??Math.random()*canvas.height;
        this.size=burst?Math.random()*4+2:Math.random()*2.5+0.5;
        const speed=burst?Math.random()*4+1:Math.random()*0.5+0.1;
        const angle=burst?Math.random()*Math.PI*2:-Math.PI/2+(Math.random()-0.5)*0.8;
        this.vx=Math.cos(angle)*speed; this.vy=Math.sin(angle)*speed;
        this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
        this.alpha=burst?1:Math.random()*0.6+0.2;
        this.decay=burst?0.025:0.003; this.life=1;
        this.isHeart=Math.random()>0.6;
      }
      update(){ this.x+=this.vx; this.y+=this.vy; this.vy-=0.005; this.life-=this.decay; }
      draw(){
        ctx.save(); ctx.globalAlpha=this.life*this.alpha; ctx.fillStyle=this.color;
        if(this.isHeart){ ctx.font=`${this.size*5}px serif`; ctx.fillText('♥',this.x,this.y); }
        else{ ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
      }
    }
    setInterval(()=>{ if(particles.length<80) particles.push(new Particle()); },120);
    function animateCanvas(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(let i=particles.length-1;i>=0;i--){
        particles[i].update(); particles[i].draw();
        if(particles[i].life<=0) particles.splice(i,1);
      }
      requestAnimationFrame(animateCanvas);
    }
    animateCanvas();
    document.addEventListener('click',e=>{ for(let i=0;i<18;i++) particles.push(new Particle(e.clientX,e.clientY,true)); });

    /* ── PETALS ── */
    for(let i=0;i<14;i++){
      const p=document.createElement('div'); p.className='petal';
      p.style.left=Math.random()*100+'vw';
      p.style.animationDuration=(Math.random()*10+8)+'s';
      p.style.animationDelay=(Math.random()*10)+'s';
      p.style.width=(Math.random()*8+5)+'px';
      p.style.height=(Math.random()*10+8)+'px';
      document.body.appendChild(p);
    }

    /* ── LOGIN (calls Flask backend) ── */
    async function login(){
      const name     = document.getElementById('name').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = '';

      try {
        const res  = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('successOverlay').classList.add('show');
          for(let i=0;i<60;i++)
            setTimeout(()=>{ particles.push(new Particle(Math.random()*canvas.width,Math.random()*canvas.height,true)); },i*40);
          setTimeout(()=>window.location.href='/dashboard', 2800);
        } else {
          const card  = document.getElementById('card');
          const flash = document.getElementById('errorFlash');
          card.classList.remove('shake');
          void card.offsetWidth;
          card.classList.add('shake');
          flash.classList.add('show');
          errorMsg.textContent = data.message || 'Only Ella can enter 💔';
          setTimeout(()=>{ flash.classList.remove('show'); card.classList.remove('shake'); }, 600);
        }
      } catch(err) {
        document.getElementById('errorMsg').textContent = 'Connection error 💔';
      }
    }

    /* ── LOVE ME ── */
    function loveMe(){
      const btn=document.getElementById('loveBtn');
      btn.innerHTML='I Love You more 💖'; btn.classList.add('activated');
      const r=btn.getBoundingClientRect();
      for(let i=0;i<30;i++) particles.push(new Particle(r.left+r.width/2,r.top+r.height/2,true));
    }

    document.addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
  </script>
</body>
</html>
