<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0006">
  <title>Tony ❤️ Ella</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #ff4d8d;
      --rose:   #ff1a6b;
      --blush:  #ffb3cc;
      --deep:   #8b0042;
      --dark:   #0a0006;
      --glass:  rgba(255,255,255,0.05);
      --border: rgba(255,77,141,0.28);
      --glow:   0 0 50px rgba(255,77,141,0.55);
      /* Safe area insets for notch/punch-hole phones */
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    html {
      height: 100%;
      /* Prevent font size inflation on rotation */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      height: 100%;
      min-height: 100dvh; /* Dynamic viewport height — handles Android browser chrome */
      width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Cormorant Garamond', serif;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      /* Padding for safe areas */
      padding-top: calc(var(--sat) + 16px);
      padding-bottom: calc(var(--sab) + 16px);
      padding-left: calc(var(--sal) + 16px);
      padding-right: calc(var(--sar) + 16px);
    }

    /* ── BACKGROUND ── */
    .ella-bg {
      position: fixed; inset: 0;
      background-image: url('/static/ella.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.13) saturate(1.8) hue-rotate(300deg);
      transform: scale(1.06);
      animation: breathe 9s ease-in-out infinite;
      z-index: 0;
      will-change: transform;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1.06); filter: brightness(0.13) saturate(1.8) hue-rotate(300deg); }
      50%      { transform: scale(1.10); filter: brightness(0.18) saturate(2.2) hue-rotate(318deg); }
    }

    /* ── NOISE TEXTURE ── */
    .noise {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; z-index: 2;
      background:
        radial-gradient(ellipse 90% 70% at 50% 0%,   rgba(255,77,141,0.22) 0%, transparent 68%),
        radial-gradient(ellipse 55% 45% at 85% 100%,  rgba(139,0,66,0.45)  0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 5%  55%,   rgba(255,26,107,0.12) 0%, transparent 60%),
        linear-gradient(180deg, rgba(10,0,6,0.25) 0%, rgba(10,0,6,0.75) 100%);
    }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    /* ── SCANLINE ── */
    .scanline {
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--pink) 40%, rgba(255,179,204,0.8) 50%, var(--pink) 60%, transparent 100%);
      animation: scan 5s linear infinite;
      z-index: 4; opacity: 0.28;
      filter: blur(0.5px);
    }
    @keyframes scan { 0% { top: -2px; } 100% { top: 100%; } }

    /* ── CORNER BRACKETS ── */
    .corner {
      position: fixed;
      width: 48px; height: 48px;
      z-index: 4; opacity: 0.5;
      animation: cornerPulse 4s ease-in-out infinite;
    }
    .corner::before, .corner::after {
      content: ''; position: absolute; background: var(--pink);
    }
    .corner::before { width: 100%; height: 1.5px; top: 0; left: 0; }
    .corner::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 20px; left: 20px; }
    .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }
    @keyframes cornerPulse {
      0%,100% { opacity: 0.5; }
      50%      { opacity: 0.85; }
    }

    /* ── CANVAS ── */
    canvas {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
    }

    /* ── ERROR FLASH ── */
    .error-flash {
      position: fixed; inset: 0; z-index: 6; pointer-events: none;
      background: rgba(255,0,60,0.1);
      opacity: 0; transition: opacity 0.08s;
    }
    .error-flash.show { opacity: 1; }

    /* ══════════════════════════════════════
       CARD — MOBILE FIRST, BIG & CLEAR
    ══════════════════════════════════════ */
    .card {
      position: relative; z-index: 10;
      width: 100%;
      max-width: 460px;
      /* Bigger, airier padding on mobile */
      padding: 36px 28px 32px;
      background: rgba(10,0,6,0.72);
      backdrop-filter: blur(32px) saturate(1.4);
      -webkit-backdrop-filter: blur(32px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow:
        0 0 0 1px rgba(255,77,141,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(255,77,141,0.12),
        inset 0 1px 0 rgba(255,255,255,0.09);
      animation: cardReveal 1.0s cubic-bezier(0.16,1,0.3,1) both;
      overflow: hidden;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(60px) scale(0.94); filter: blur(8px); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    filter: blur(0); }
    }

    /* shimmer top border */
    .card::before {
      content: '';
      position: absolute; top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 55%; height: 1px;
      background: linear-gradient(90deg, transparent, #ff85b3, white, #ff85b3, transparent);
      animation: shimmerLine 3.5s ease-in-out infinite;
    }
    @keyframes shimmerLine {
      0%,100% { opacity: 0.4; width: 40%; }
      50%      { opacity: 1;   width: 78%; }
    }

    /* inner glow */
    .card::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 32px;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,77,141,0.09) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .heart-icon {
      display: inline-block;
      /* BIGGER heart — much more visible on phone */
      font-size: 52px;
      animation: hb 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 16px var(--pink)) drop-shadow(0 0 32px rgba(255,77,141,0.55));
      margin-bottom: 12px;
      line-height: 1;
    }
    @keyframes hb {
      0%,100% { transform: scale(1); }
      14%     { transform: scale(1.28); }
      28%     { transform: scale(1); }
      42%     { transform: scale(1.20); }
      70%     { transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      /* Big, bold, unmissable on Android */
      font-size: clamp(1.9rem, 7vw, 2.3rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1.1;
      animation: fadeUp 1.1s 0.25s cubic-bezier(0.16,1,0.3,1) both;
      text-shadow: 0 0 30px rgba(255,77,141,0.3);
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(0.95rem, 3.2vw, 1.05rem);
      color: rgba(255,179,204,0.8);
      font-style: italic;
      letter-spacing: 0.06em;
      animation: fadeUp 1.1s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── INPUT GROUPS ── */
    .input-group {
      position: relative;
      margin-bottom: 20px;
      animation: fadeUp 1.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .input-group:nth-of-type(1) { animation-delay: 0.52s; }
    .input-group:nth-of-type(2) { animation-delay: 0.65s; }

    .input-label {
      display: block;
      /* Bigger label — easier to read on phone */
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,179,204,0.75);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 9px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      /* Bigger icon */
      font-size: 18px;
      opacity: 0.55;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 1;
    }

    input {
      width: 100%;
      /* Taller input — easier to tap on phone (min 48px touch target) */
      padding: 17px 18px 17px 48px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,77,141,0.25);
      border-radius: 16px;
      color: white;
      font-family: 'Cormorant Garamond', serif;
      /* 16px minimum to prevent iOS/Android auto-zoom */
      font-size: 17px;
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      -webkit-appearance: none;
      appearance: none;
      /* Smooth touch interaction */
      -webkit-tap-highlight-color: transparent;
    }
    input::placeholder {
      color: rgba(255,179,204,0.32);
      font-style: italic;
    }
    input:focus {
      border-color: var(--pink);
      background: rgba(255,77,141,0.08);
      box-shadow: 0 0 0 4px rgba(255,77,141,0.16), 0 0 24px rgba(255,77,141,0.18);
    }
    .input-wrap:focus-within .input-icon { opacity: 1; }
    .input-group:focus-within .input-label { color: rgba(255,179,204,1); }

    /* ── STRENGTH BAR ── */
    .strength-bar {
      height: 3px;
      margin-top: 7px;
      border-radius: 3px;
      background: rgba(255,77,141,0.14);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--rose), var(--pink), #ff85b3);
      transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 0 10px rgba(255,77,141,0.7);
    }

    /* ── ENTER BUTTON — BIG, BOLD, THUMB-FRIENDLY ── */
    .btn-enter {
      width: 100%;
      /* Tall button — easy to press with thumb */
      padding: 18px 16px;
      margin-top: 8px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #ff5c96 0%, var(--rose) 100%);
      color: white;
      font-family: 'Playfair Display', serif;
      /* Bigger, bolder text */
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s;
      box-shadow:
        0 8px 32px rgba(255,77,141,0.48),
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
      animation: fadeUp 1.1s 0.8s cubic-bezier(0.16,1,0.3,1) both;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      /* Ensure minimum touch target */
      min-height: 56px;
    }
    .btn-enter::before {
      content: '';
      position: absolute; top: 0; left: -120%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    .btn-enter:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px rgba(255,77,141,0.42);
    }

    /* ripple */
    .btn-enter .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transform: scale(0);
      animation: rippleAnim 0.55s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* loading spinner */
    .btn-enter.loading { pointer-events: none; }
    .btn-enter.loading .btn-text { opacity: 0; }
    .btn-enter.loading::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 24px; height: 24px;
      margin: -12px 0 0 -12px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR MESSAGE ── */
    .error-msg {
      text-align: center;
      color: #ff85b3;
      /* Bigger error text */
      font-size: 0.95rem;
      margin-top: 10px;
      min-height: 20px;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .error-msg.visible {
      opacity: 1; transform: translateY(0);
    }

    /* ── LOVE SECTION ── */
    .love-section {
      margin-top: 26px;
      text-align: center;
      animation: fadeUp 1.1s 1.0s cubic-bezier(0.16,1,0.3,1) both;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,77,141,0.3), transparent);
    }
    .divider-dot {
      font-size: 11px; color: rgba(255,77,141,0.6);
      letter-spacing: 5px;
    }

    /* ── LOVE BUTTON — WIDE & TAPPABLE ── */
    .btn-love {
      background: transparent;
      border: 1.5px solid rgba(255,77,141,0.4);
      /* Wider and taller for easy tapping */
      padding: 14px 40px;
      border-radius: 50px;
      color: var(--blush);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      min-height: 52px;
      min-width: 200px;
    }
    .btn-love::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,77,141,0.18) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.3s;
      border-radius: 50px;
    }
    .btn-love:active {
      transform: scale(0.97);
      border-color: var(--pink);
      box-shadow: 0 0 24px rgba(255,77,141,0.4);
      color: white;
    }
    .btn-love:active::before { opacity: 1; }
    .btn-love.activated {
      border-color: var(--rose);
      background: rgba(255,26,107,0.2);
      box-shadow: 0 0 44px rgba(255,26,107,0.6);
      color: white;
      animation: lovePop 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes lovePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.1); }
      70%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .footer-text {
      margin-top: 14px;
      font-size: 0.78rem;
      color: rgba(255,179,204,0.38);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── SHAKE ANIMATION ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      12% { transform: translateX(-10px) rotate(-0.4deg); }
      25% { transform: translateX(10px)  rotate(0.4deg);  }
      37% { transform: translateX(-7px); }
      50% { transform: translateX(7px);  }
      62% { transform: translateX(-4px); }
      75% { transform: translateX(4px);  }
      87% { transform: translateX(-2px); }
    }
    .shake { animation: shake 0.55s cubic-bezier(0.36,0.07,0.19,0.97) !important; }

    /* ── SUCCESS OVERLAY ── */
    .success-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: radial-gradient(ellipse at 50% 40%, rgba(255,77,141,0.97) 0%, rgba(100,0,42,0.99) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter: blur(12px);
      padding: 24px;
    }
    .success-overlay.show { opacity: 1; pointer-events: all; }

    .success-big-heart {
      font-size: clamp(72px, 22vw, 100px);
      animation: hb 1s ease-in-out infinite, successPop 0.7s 0.2s cubic-bezier(0.16,1,0.3,1) both;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.45));
    }
    .success-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      color: white;
      text-align: center;
      text-shadow: 0 0 40px rgba(255,255,255,0.35);
      animation: successPop 0.7s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .success-overlay p {
      color: rgba(255,255,255,0.85);
      font-size: clamp(1.1rem, 4vw, 1.3rem);
      font-style: italic;
      text-align: center;
      animation: successPop 0.7s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes successPop {
      from { opacity: 0; transform: scale(0.4) translateY(20px); filter: blur(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0);     filter: blur(0); }
    }

    /* ── PETALS ── */
    .petal {
      position: fixed;
      background: radial-gradient(ellipse, #ff5c96, #c0002a);
      border-radius: 50% 0 50% 0;
      pointer-events: none; z-index: 5; opacity: 0;
      animation: petalFall linear infinite;
      filter: blur(0.3px);
    }
    @keyframes petalFall {
      0%   { opacity: 0;    transform: translateY(-30px) rotate(0deg) scale(0); }
      8%   { opacity: 0.75; transform: translateY(0)    rotate(25deg) scale(1); }
      90%  { opacity: 0.5; }
      100% { opacity: 0;    transform: translateY(108vh) rotate(380deg) scale(0.4); }
    }

    /* ── FLOATING HEARTS ── */
    .float-heart {
      position: fixed;
      pointer-events: none;
      z-index: 4; opacity: 0;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 6px var(--pink));
    }
    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0) scale(0.6) rotate(-10deg); }
      15%  { opacity: 0.6; }
      85%  { opacity: 0.3; }
      100% { opacity: 0;   transform: translateY(-110px) scale(1) rotate(10deg); }
    }

    /* ════════════════════════════════════════
       KEYBOARD-AWARE: push card up when
       virtual keyboard opens on Android
    ════════════════════════════════════════ */
    @media (max-height: 520px) {
      body {
        justify-content: flex-start;
        padding-top: 12px;
      }
      .card {
        padding: 22px 22px 20px;
        border-radius: 24px;
      }
      .header { margin-bottom: 16px; }
      .heart-icon { font-size: 36px; margin-bottom: 6px; }
      h1 { font-size: 1.55rem; }
      .subtitle { font-size: 0.88rem; margin-top: 4px; }
      .input-group { margin-bottom: 14px; }
      input { padding: 14px 14px 14px 44px; font-size: 16px; }
      .btn-enter { padding: 15px; font-size: 1rem; min-height: 50px; }
      .love-section { margin-top: 16px; }
      .btn-love { padding: 11px 30px; min-height: 46px; }
    }

    /* Small phones (360px and under) */
    @media (max-width: 360px) {
      body { padding-left: 12px; padding-right: 12px; }
      .card { padding: 28px 20px 26px; }
      h1 { font-size: 1.7rem; }
    }

    /* Tablets and larger — keep it centred and max-width */
    @media (min-width: 520px) {
      .card {
        padding: 44px 44px 40px;
      }
    }
  </style>
</head>
<body>
  <!-- bg layers -->
  <div class="ella-bg"></div>
  <div class="noise"></div>
  <div class="overlay"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>

  <!-- corner brackets -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <canvas id="canvas"></canvas>
  <div class="error-flash" id="errorFlash"></div>

  <!-- SUCCESS -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-big-heart">❤️</div>
    <h2>Welcome, My Love</h2>
    <p>Entering our world…</p>
  </div>

  <!-- CARD -->
  <div class="card" id="card">
    <div class="header">
      <div class="heart-icon">💕</div>
      <h1>Welcome, Ella</h1>
      <p class="subtitle">from Tonie, with all my heart</p>
    </div>

    <div class="input-group">
      <label class="input-label">Your Name</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="name" placeholder="Type your name…"
          autocomplete="off" autocorrect="off" autocapitalize="none"
          spellcheck="false" inputmode="text">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label">Secret Code</label>
      <div class="input-wrap">
        <span class="input-icon">🔑</span>
        <input type="password" id="password" placeholder="Our little secret…"
          autocomplete="current-password" inputmode="text">
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <button class="btn-enter" id="btnEnter" onclick="login(event)">
      <span class="btn-text">Enter Our World ✦</span>
    </button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="love-section">
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot">✦ ✦ ✦</div>
        <div class="divider-line"></div>
      </div>
      <button class="btn-love" id="loveBtn" onclick="loveMe(event)">Love Me? 💗</button>
      <p class="footer-text">Only for Ella · Forever</p>
    </div>
  </div>

  <script>
  /* ══════════════════════════════════════════
     CANVAS PARTICLES
  ══════════════════════════════════════════ */
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  /* Also handle Android visual viewport changes (keyboard) */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', resizeCanvas);
  }

  const COLORS = ['#ff4d8d','#ff1a6b','#ffb3cc','#ff85b3','#ff6699','#ffd6e7'];

  class Particle {
    constructor(x, y, burst=false){
      this.x = x ?? Math.random()*canvas.width;
      this.y = y ?? Math.random()*canvas.height;
      this.size = burst ? Math.random()*4+2 : Math.random()*2.4+0.5;
      const spd = burst ? Math.random()*5+1.5 : Math.random()*0.55+0.1;
      const ang = burst ? Math.random()*Math.PI*2 : -Math.PI/2+(Math.random()-0.5)*0.9;
      this.vx = Math.cos(ang)*spd;
      this.vy = Math.sin(ang)*spd;
      this.color = COLORS[Math.random()*COLORS.length|0];
      this.alpha = burst ? 1 : Math.random()*0.55+0.2;
      this.decay = burst ? 0.022 : 0.0025;
      this.life  = 1;
      this.isHeart = Math.random() > 0.55;
      this.spin  = (Math.random()-0.5)*0.06;
      this.rotation = Math.random()*Math.PI*2;
    }
    update(){
      this.x += this.vx;
      this.y += this.vy;
      this.vy -= 0.004;
      this.rotation += this.spin;
      this.life -= this.decay;
    }
    draw(){
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life) * this.alpha;
      ctx.fillStyle = this.color;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      if(this.isHeart){
        ctx.font = `${this.size*6}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♥', 0, 0);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  const particles = [];
  /* Fewer ambient particles on mobile = smoother performance */
  const MAX_PARTICLES = window.innerWidth < 480 ? 55 : 90;
  setInterval(()=>{
    if(particles.length < MAX_PARTICLES) particles.push(new Particle());
  }, 130);

  (function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1; i>=0; i--){
      particles[i].update();
      particles[i].draw();
      if(particles[i].life <= 0) particles.splice(i,1);
    }
    requestAnimationFrame(loop);
  })();

  /* tap / click burst */
  function burst(x, y, n=18){
    for(let i=0; i<n; i++) particles.push(new Particle(x, y, true));
  }
  document.addEventListener('click', e => burst(e.clientX, e.clientY, 16));
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    burst(t.clientX, t.clientY, 18);
  }, {passive:true});

  /* ══════════════════════════════════════════
     PETALS
  ══════════════════════════════════════════ */
  for(let i=0; i<14; i++){
    const p = document.createElement('div');
    p.className = 'petal';
    const size = Math.random()*9+5;
    p.style.cssText = `
      left:${Math.random()*100}vw;
      width:${size}px;
      height:${size*1.3}px;
      animation-duration:${Math.random()*12+9}s;
      animation-delay:${Math.random()*12}s;
      opacity:0;
    `;
    document.body.appendChild(p);
  }

  /* ══════════════════════════════════════════
     FLOATING AMBIENT HEARTS
  ══════════════════════════════════════════ */
  const heartEmoji = ['💕','💗','💖','💓','♥','✦'];
  for(let i=0; i<7; i++){
    const h = document.createElement('div');
    h.className='float-heart';
    h.textContent = heartEmoji[i % heartEmoji.length];
    h.style.cssText = `
      left:${Math.random()*100}vw;
      bottom:${Math.random()*25}vh;
      font-size:${Math.random()*10+12}px;
      animation-duration:${Math.random()*6+5}s;
      animation-delay:${Math.random()*8}s;
    `;
    document.body.appendChild(h);
  }

  /* ══════════════════════════════════════════
     PASSWORD STRENGTH BAR
  ══════════════════════════════════════════ */
  document.getElementById('password').addEventListener('input', function(){
    const pct = Math.min(100, this.value.length * 11);
    document.getElementById('strengthFill').style.width = pct + '%';
  });

  /* ══════════════════════════════════════════
     RIPPLE HELPER
  ══════════════════════════════════════════ */
  function addRipple(btn, e){
    const rect = btn.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    const x = (touch.clientX || rect.left+rect.width/2) - rect.left;
    const y = (touch.clientY || rect.top+rect.height/2) - rect.top;
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
    btn.appendChild(r);
    setTimeout(()=>r.remove(), 600);
  }

  /* ══════════════════════════════════════════
     ERROR HELPER
  ══════════════════════════════════════════ */
  function showError(msg){
    const card  = document.getElementById('card');
    const flash = document.getElementById('errorFlash');
    const err   = document.getElementById('errorMsg');

    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');

    flash.classList.add('show');
    err.textContent = msg;
    err.classList.add('visible');

    setTimeout(()=>{
      flash.classList.remove('show');
      card.classList.remove('shake');
    }, 600);
  }

  /* ══════════════════════════════════════════
     LOGIN
  ══════════════════════════════════════════ */
  async function login(e){
    const btn = document.getElementById('btnEnter');
    addRipple(btn, e);

    const name     = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('visible');
    errorMsg.textContent = '';

    btn.classList.add('loading');

    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, password})
      });
      const data = await res.json();
      btn.classList.remove('loading');

      if(data.success){
        document.getElementById('successOverlay').classList.add('show');
        for(let i=0; i<80; i++)
          setTimeout(()=>{
            particles.push(new Particle(
              Math.random()*canvas.width,
              Math.random()*canvas.height,
              true
            ));
          }, i*35);
        setTimeout(()=>window.location.href='/dashboard', 2800);
      } else {
        showError(data.message || 'Only Ella can enter 💔');
      }
    } catch(err){
      btn.classList.remove('loading');
      showError('Connection error 💔');
    }
  }

  /* ══════════════════════════════════════════
     LOVE ME
  ══════════════════════════════════════════ */
  function loveMe(e){
    const btn = document.getElementById('loveBtn');
    addRipple(btn, e);
    btn.innerHTML = 'I Love You more 💖';
    btn.classList.add('activated');
    const r = btn.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, 40);
  }

  /* ══════════════════════════════════════════
     KEYBOARD ENTER
  ══════════════════════════════════════════ */
  document.addEventListener('keydown', e => {
    if(e.key === 'Enter') login(e);
  });

  /* ══════════════════════════════════════════
     ANDROID KEYBOARD — scroll card into view
     when virtual keyboard opens
  ══════════════════════════════════════════ */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', () => {
      const focused = document.activeElement;
      if(focused && (focused.tagName === 'INPUT')){
        setTimeout(() => {
          focused.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    });
  }
  </script>
</body>
</html>
