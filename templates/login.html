<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tony ❤️ Ella</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Quicksand:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --pink:      #ff4d8d;
  --rose:      #ff8cb4;
  --deep:      #c2185b;
  --gold:      #ffd6e8;
  --glass-bg:  rgba(255,255,255,0.07);
  --glass-bdr: rgba(255,180,210,0.25);
}

html,body{
  width:100%;
  min-height:100%;
  height:100%;
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
  touch-action:manipulation;
}

/* ── BACKGROUND PHOTO ── */
.bg-photo{
  position:fixed;
  inset:0;
  background:url ('/static/ell.jpg') center center / cover no-repeat;
  z-index:0;
}

/* dark + vignette tint over photo */
.bg-photo::after{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.88) 100%),
    linear-gradient(160deg, rgba(120,0,50,0.55) 0%, rgba(40,0,20,0.80) 100%);
}

/* ── ANIMATED SHIMMER LAYER ── */
.shimmer{
  position:fixed;
  inset:0;
  z-index:1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(180,40,100,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(180,20,70,0.10) 0%, transparent 60%);
  animation:shimmerPulse 8s ease-in-out infinite;
}
@keyframes shimmerPulse{
  0%,100%{opacity:0.6}
  50%{opacity:1}
}

/* ── PARTICLES (CSS only, lightweight) ── */
.particles{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.p{
  position:absolute;
  border-radius:50%;
  background:rgba(255,140,180,0.55);
  animation:drift linear infinite;
}
@keyframes drift{
  0%  {transform:translateY(110vh) scale(0.5); opacity:0}
  10% {opacity:0.8}
  90% {opacity:0.6}
  100%{transform:translateY(-10vh) scale(1.2); opacity:0}
}

/* ── HEARTS ── */
.heart-wrap{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  overflow:hidden;
}
.ht{
  position:absolute;
  font-size:14px;
  animation:heartRise linear infinite;
  opacity:0;
  filter:drop-shadow(0 0 4px rgba(255,100,160,0.8));
}
@keyframes heartRise{
  0%  {transform:translateY(105vh) rotate(-15deg) scale(0.6); opacity:0}
  15% {opacity:1}
  85% {opacity:0.7}
  100%{transform:translateY(-8vh) rotate(15deg) scale(1.1); opacity:0}
}

/* ── GLOW ORBS ── */
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(60px);
  z-index:1;
  animation:orbFloat ease-in-out infinite;
  pointer-events:none;
}
.orb1{width:220px;height:220px;background:rgba(180,30,80,0.13);top:-60px;left:-60px;animation-duration:14s;}
.orb2{width:180px;height:180px;background:rgba(200,60,110,0.10);bottom:-40px;right:-40px;animation-duration:11s;animation-delay:-5s;}
.orb3{width:140px;height:140px;background:rgba(120,20,50,0.10);top:40%;left:60%;animation-duration:9s;animation-delay:-3s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(20px,-20px) scale(1.08)}
  66%{transform:translate(-15px,15px) scale(0.94)}
}

/* ── WRAPPER ── */
.wrapper{
  position:relative;
  z-index:10;
  width:100%;
  height:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* ── CARD ── */
.card{
  width:100%;
  max-width:380px;
  padding:38px 32px 34px;
  border-radius:28px;
  background:rgba(8,0,4,0.72);
  border:1px solid rgba(200,80,130,0.18);
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  box-shadow:
    0 8px 56px rgba(80,0,30,0.55),
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 1px 0 rgba(200,100,150,0.14) inset;
  text-align:center;
  animation:cardIn 1.1s cubic-bezier(0.16,1,0.3,1) both;
  position:relative;
  overflow:hidden;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(50px) scale(0.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* card top glow line */
.card::before{
  content:'';
  position:absolute;
  top:0;left:10%;
  width:80%;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,160,200,0.6), transparent);
}

/* card inner shimmer sweep */
.card::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events:none;
  border-radius:28px;
}

/* ── PHOTO AVATAR ── */
.avatar-wrap{
  position:relative;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-bottom:18px;
  animation:cardIn 1.3s cubic-bezier(0.16,1,0.3,1) both;
  animation-delay:0.15s;
}
.avatar{
  width:76px;height:76px;
  border-radius:50%;
  background:url('/static/ella1.png') center top / cover no-repeat;
  border:2.5px solid rgba(29, 27, 28, 0.5);
  box-shadow:0 0 0 6px rgba(255,100,150,0.12), 0 4px 24px rgba(200,0,80,0.3);
}
.avatar-ring{
  position:absolute;
  inset:-6px;
  border-radius:50%;
  border:1.5px solid transparent;
  background:linear-gradient(135deg,rgba(255,100,160,0.6),transparent,rgba(255,60,120,0.4)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
  animation:spinRing 6s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}

/* ── TITLE ── */
.title{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;
  font-weight:600;
  letter-spacing:0.02em;
  color:#fff;
  text-shadow:0 2px 18px rgba(255,80,140,0.5);
  line-height:1.1;
  margin-bottom:4px;
  animation:fadeUp 1s ease both;
  animation-delay:0.25s;
}
.subtitle{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-weight:300;
  font-size:0.95rem;
  color:rgba(255,200,220,0.8);
  margin-bottom:28px;
  letter-spacing:0.08em;
  animation:fadeUp 1s ease both;
  animation-delay:0.35s;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── INPUTS ── */
.input-group{
  position:relative;
  margin-bottom:14px;
  animation:fadeUp 1s ease both;
}
.input-group:nth-child(4){animation-delay:0.45s;}
.input-group:nth-child(5){animation-delay:0.55s;}

.input-icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:1rem;
  pointer-events:none;
  z-index:2;
  opacity:0.7;
}
input{
  width:100%;
  padding:15px 15px 15px 42px;
  border:1px solid rgba(200,80,130,0.18);
  border-radius:14px;
  background:rgba(0,0,0,0.35);
  color:#fff;
  font-family:'Quicksand',sans-serif;
  font-size:0.95rem;
  font-weight:500;
  letter-spacing:0.03em;
  transition:border-color 0.3s, box-shadow 0.3s, background 0.3s;
  -webkit-appearance:none;
  appearance:none;
}
input::placeholder{color:rgba(255,200,220,0.5);font-weight:300;}
input:focus{
  outline:none;
  border-color:rgba(255,80,140,0.45);
  background:rgba(0,0,0,0.45);
  box-shadow:0 0 0 3px rgba(200,0,80,0.18), 0 0 18px rgba(200,0,80,0.14);
}
/* fix iOS autofill ugly yellow */
input:-webkit-autofill,
input:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 1000px rgba(80,0,40,0.7) inset !important;
  -webkit-text-fill-color:#fff !important;
}

/* ── BUTTON ── */
.btn-wrap{
  animation:fadeUp 1s ease both;
  animation-delay:0.65s;
  margin-top:6px;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:50px;
  background:linear-gradient(130deg, #c2185b 0%, #880e4f 60%, #560b35 100%);
  color:#fff;
  font-family:'Quicksand',sans-serif;
  font-size:1rem;
  font-weight:600;
  letter-spacing:0.06em;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform 0.18s, box-shadow 0.25s;
  box-shadow:0 4px 22px rgba(100,0,40,0.55), 0 1px 0 rgba(200,80,130,0.15) inset;
  -webkit-appearance:none;
  appearance:none;
  touch-action:manipulation;
}
button::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  border-radius:50px;
}
button::after{
  content:'';
  position:absolute;
  top:50%;left:50%;
  width:0;height:0;
  background:rgba(255,255,255,0.25);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width 0.4s ease, height 0.4s ease, opacity 0.4s;
  opacity:0;
}
button:active::after{
  width:200px;height:200px;
  opacity:0;
}
button:active{
  transform:scale(0.97);
  box-shadow:0 2px 12px rgba(200,0,80,0.35);
}
@media(hover:hover){
  button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(200,0,80,0.5);
  }
}

/* ── DIVIDER ── */
.divider{
  display:flex;
  align-items:center;
  gap:10px;
  margin:18px 0 14px;
  animation:fadeUp 1s ease both;
  animation-delay:0.7s;
}
.divider::before,.divider::after{
  content:'';flex:1;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,140,180,0.3),transparent);
}
.divider span{
  font-size:0.75rem;
  color:rgba(255,200,220,0.5);
  letter-spacing:0.1em;
  white-space:nowrap;
}

/* ── ERROR ── */
.error{
  min-height:20px;
  color:#ff8cb4;
  font-size:0.82rem;
  margin-top:12px;
  letter-spacing:0.03em;
  animation:fadeUp 0.4s ease;
  text-shadow:0 0 10px rgba(255,80,140,0.4);
}

/* ── LOADING STATE ── */
.loading-dots{
  display:inline-flex;
  gap:5px;
  align-items:center;
}
.loading-dots span{
  width:5px;height:5px;
  border-radius:50%;
  background:#fff;
  animation:dotBounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotBounce{
  0%,80%,100%{transform:scale(0.6);opacity:0.4}
  40%{transform:scale(1);opacity:1}
}

/* ── SUCCESS SCREEN ── */
.success{
  position:fixed;
  inset:0;
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
  padding:20px;
  text-align:center;
}
.success.show{
  opacity:1;
  pointer-events:all;
}
.success-heart{
  font-size:5rem;
  animation:heartBeat 1s ease-in-out infinite;
  margin-bottom:20px;
  filter:drop-shadow(0 0 20px rgba(255,80,140,0.8));
}
@keyframes heartBeat{
  0%,100%{transform:scale(1)}
  14%{transform:scale(1.2)}
  28%{transform:scale(1)}
  42%{transform:scale(1.15)}
  70%{transform:scale(1)}
}
.success-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;
  color:#fff;
  font-weight:600;
  text-shadow:0 0 30px rgba(255,80,140,0.6);
  margin-bottom:10px;
  animation:fadeUp 0.8s ease both;
}
.success-sub{
  font-size:1rem;
  color:rgba(255,200,220,0.8);
  font-style:italic;
  animation:fadeUp 0.8s ease 0.2s both;
}

/* ── MOBILE TWEAKS ── */
@media(max-width:400px){
  .card{padding:30px 22px 26px;}
  .title{font-size:1.9rem;}
  .avatar{width:66px;height:66px;}
  input{font-size:16px;} /* prevents iOS zoom on focus */
  button{font-size:0.95rem;}
}
@media(max-height:600px){
  .card{padding:22px 22px 20px;}
  .avatar{width:52px;height:52px;}
  .title{font-size:1.6rem;margin-bottom:2px;}
  .subtitle{margin-bottom:16px;}
  .input-group{margin-bottom:10px;}
}
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-photo"></div>
<div class="shimmer"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Hearts -->
<div class="heart-wrap" id="hearts"></div>

<!-- Main -->
<div class="wrapper">
  <div class="card">

    <div class="avatar-wrap">
      <div class="avatar"></div>
      <div class="avatar-ring"></div>
    </div>

    <h1 class="title">Ella 💖</h1>
    <p class="subtitle">our little secret world</p>

    <div class="input-group">
      <span class="input-icon">🌸</span>
      <input id="name" type="text" placeholder="Your Name" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="input-group">
      <span class="input-icon">🔑</span>
      <input id="password" type="password" placeholder="Secret Code" autocomplete="current-password">
    </div>

    <div class="divider"><span>✦ &nbsp; with love &nbsp; ✦</span></div>

    <div class="btn-wrap">
      <button id="loginBtn" onclick="login()">Enter Our World 💌</button>
    </div>

    <div class="error" id="error"></div>
  </div>
</div>

<!-- Success overlay -->
<div class="success" id="success">
  <div class="success-heart">❤️</div>
  <p class="success-title">Welcome, My Love</p>
  <p class="success-sub">Always & forever yours…</p>
</div>

<script>
/* ── PARTICLES ── */
(function(){
  const wrap = document.getElementById('particles');
  const count = 14;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'p';
    const size = 3 + Math.random()*5;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${9+Math.random()*10}s;
      animation-delay:${Math.random()*12}s;
      opacity:${0.3+Math.random()*0.4};
    `;
    wrap.appendChild(p);
  }
})();

/* ── HEARTS ── */
(function(){
  const wrap = document.getElementById('hearts');
  const emojis = ['❤️','💕','💗','💓','💖'];
  let max = 18;
  setInterval(()=>{
    if(wrap.children.length > max) return;
    const h = document.createElement('div');
    h.className = 'ht';
    const dur = 7 + Math.random()*6;
    h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.cssText = `
      left:${Math.random()*96}%;
      font-size:${10+Math.random()*10}px;
      animation-duration:${dur}s;
      animation-delay:${Math.random()*4}s;
    `;
    wrap.appendChild(h);
    setTimeout(()=>h.remove(), (dur+4)*1000);
  }, 600);
})();

/* ── ENTER KEY ── */
document.addEventListener('keydown', e=>{
  if(e.key==='Enter') login();
});

/* ── LOGIN ── */
async function login(){
  const btn   = document.getElementById('loginBtn');
  const name  = document.getElementById('name').value.trim();
  const pass  = document.getElementById('password').value;
  const errEl = document.getElementById('error');

  errEl.textContent = '';

  if(!name || !pass){
    shake(btn);
    errEl.textContent = '💔 Please fill in both fields';
    return;
  }

  /* loading state */
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

  try{
    const res  = await fetch('/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name, password:pass})
    });
    const data = await res.json();

    if(data.success){
      document.getElementById('success').classList.add('show');
      burstHearts();
      setTimeout(()=> window.location.href='/dashboard', 2200);
    } else {
      shake(btn);
      errEl.textContent = data.message || '💔 Wrong details, try again';
      resetBtn();
    }
  } catch(err){
    /* If no server yet, just show success for preview */
    document.getElementById('success').classList.add('show');
    burstHearts();
    setTimeout(()=> resetBtn(), 2200);
  }
}

function resetBtn(){
  const btn = document.getElementById('loginBtn');
  btn.disabled = false;
  btn.innerHTML = 'Enter Our World 💌';
}

function shake(el){
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'shake 0.4s ease';
}

/* ── BURST hearts on success ── */
function burstHearts(){
  const wrap = document.getElementById('hearts');
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const h = document.createElement('div');
      h.className='ht';
      h.textContent = ['❤️','💕','💖','💗'][Math.floor(Math.random()*4)];
      h.style.cssText=`
        left:${20+Math.random()*60}%;
        font-size:${14+Math.random()*16}px;
        animation-duration:${3+Math.random()*3}s;
        animation-delay:0s;
      `;
      wrap.appendChild(h);
      setTimeout(()=>h.remove(),6000);
    }, i*80);
  }
}
</script>

<style>
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
</style>

</body>
</html>
